<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="6" ry="6" fill="url(#bgGrad)"/>
  <path d="M0 6 Q0 0 6 0 L58 0 Q64 0 64 6 L64 28 Q32 36 0 28 Z" fill="url(#shine)"/>
  <!-- Broom / cleaning icon -->
  <rect x="14" y="12" width="36" height="3" rx="1" fill="#e65100" transform="rotate(-30 32 32)"/>
  <!-- Sparkles -->
  <text x="46" y="18" fill="#ffa726" font-size="12" text-anchor="middle">&#x2728;</text>
  <text x="18" y="52" fill="#ffa726" font-size="10" text-anchor="middle">&#x2728;</text>
  <!-- Data grid (dirty -> clean) -->
  <rect x="10" y="36" width="18" height="18" rx="2" fill="#5c1a1a" stroke="#ff6b4a" stroke-width="1"/>
  <line x1="10" y1="42" x2="28" y2="42" stroke="#ff6b4a" stroke-width="0.5" stroke-dasharray="2"/>
  <line x1="10" y1="48" x2="28" y2="48" stroke="#ff6b4a" stroke-width="0.5" stroke-dasharray="2"/>
  <text x="19" y="46" fill="#ff6b4a" font-size="6" text-anchor="middle">?</text>
  <!-- Arrow -->
  <line x1="30" y1="45" x2="34" y2="45" stroke="#fff" stroke-width="1.5"/>
  <polygon points="36,45 33,43 33,47" fill="#fff"/>
  <!-- Clean grid -->
  <rect x="36" y="36" width="18" height="18" rx="2" fill="#1a3d1a" stroke="#4caf50" stroke-width="1"/>
  <line x1="36" y1="42" x2="54" y2="42" stroke="#4caf50" stroke-width="0.5"/>
  <line x1="36" y1="48" x2="54" y2="48" stroke="#4caf50" stroke-width="0.5"/>
  <text x="45" y="46" fill="#4caf50" font-size="6" font-weight="bold" text-anchor="middle">&#x2713;</text>
  <!-- AI badge -->
  <text x="32" y="30" fill="#ffa726" font-size="8" font-weight="bold" text-anchor="middle">AI</text>
</svg>
