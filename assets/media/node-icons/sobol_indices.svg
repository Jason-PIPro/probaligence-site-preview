<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="6" ry="6" fill="url(#bgGrad)"/>
  <path d="M0 6 Q0 0 6 0 L58 0 Q64 0 64 6 L64 28 Q32 36 0 28 Z" fill="url(#shine)"/>
  
  <!-- Horizontal bar chart showing Sobol indices -->
  
  <!-- Variable 1 - First-order S1 (inner bar) -->
  <rect x="12" y="20" width="20" height="6" fill="#ffb006" opacity="0.7"/>
  <!-- Total-order ST1 (outer bar, wider) -->
  <rect x="12" y="20" width="28" height="6" fill="#ffb006" opacity="0.3" stroke="#ffb006" stroke-width="1"/>
  
  <!-- Variable 2 - First-order S2 -->
  <rect x="12" y="29" width="16" height="6" fill="#4CAF50" opacity="0.7"/>
  <!-- Total-order ST2 -->
  <rect x="12" y="29" width="24" height="6" fill="#4CAF50" opacity="0.3" stroke="#4CAF50" stroke-width="1"/>
  
  <!-- Variable 3 - First-order S3 -->
  <rect x="12" y="38" width="12" height="6" fill="#ff6b4a" opacity="0.7"/>
  <!-- Total-order ST3 -->
  <rect x="12" y="38" width="18" height="6" fill="#ff6b4a" opacity="0.3" stroke="#ff6b4a" stroke-width="1"/>
  
  <!-- Baseline at left (moved on top) -->
  <line x1="12" y1="18" x2="12" y2="46" stroke="#fff" stroke-width="1.5"/>
  
  <!-- Labels -->
  <text x="5" y="24" fill="#fff" font-size="6" font-family="Arial">X₁</text>
  <text x="5" y="33" fill="#fff" font-size="6" font-family="Arial">X₂</text>
  <text x="5" y="42" fill="#fff" font-size="6" font-family="Arial">X₃</text>
  
  <!-- Legend -->
  <rect x="44" y="23" width="6" height="3" fill="#fff" opacity="0.7"/>
  <text x="52" y="26" fill="#fff" font-size="5" font-family="Arial">Sᵢ</text>
  
  <rect x="44" y="30" width="8" height="3" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <text x="54" y="33" fill="#fff" font-size="5" font-family="Arial">STᵢ</text>
</svg>
